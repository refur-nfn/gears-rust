[whatsnew."v1.3.0"]
summary = "v1.3.0"
details = "# Constructor Studio v1.3.0\r\n\r\nv1.3.0 makes kits easier to package, install, validate, and share across repositories.\r\n\r\n## What's New\r\n\r\n### Better kit packaging\r\n\r\nConstructor Studio now supports canonical `.cf-studio-kit.toml` kit manifests. Kit authors can describe skills, agents, rules, prompts, support files, public generated components, and install behavior in one predictable format.\r\n\r\nExisting kit formats still work. Legacy manifests and layout-based kits are normalized into the same internal model, so older kits can be migrated gradually.\r\n\r\n### Multi-kit sources\r\n\r\nA single kit package can now contain multiple kits. During install, you can choose one kit, multiple kits, or all kits from the source.\r\n\r\n```bash\r\ncfs kit install owner/repo --kit my-kit\r\ncfs kit install owner/repo --kit all\r\n```\r\n\r\n### Safer local kit installs\r\n\r\nLocal kit installs now ask whether Studio should copy kit resources into managed storage or register eligible project files in place.\r\n\r\n```bash\r\ncfs kit install --path ./my-kit --install-mode copy\r\ncfs kit install --path ./my-kit --install-mode register\r\n```\r\n\r\nThis makes local kit development clearer and avoids accidental file ownership surprises.\r\n\r\n### Kit normalization\r\n\r\nNew normalization tooling helps preview or create canonical kit manifests:\r\n\r\n```bash\r\ncfs kit normalize ./my-kit --dry-run\r\ncfs kit normalize ./my-kit --stdout\r\n```\r\n\r\nUse this to check a kit, inspect generated public names, and migrate older kit layouts.\r\n\r\n### Public skills, agents, and rules\r\n\r\nKits can now publish public skills, agents, rules, and nested subagents into generated AI tool integration files. Studio validates generated names to avoid collisions between installed kits.\r\n\r\n### Update checks\r\n\r\n`cfs check-updates` can now check for available updates to the proxy package, Studio skill engine, and installed kits.\r\n\r\n## Improvements\r\n\r\n- Stronger kit validation for manifests, paths, public resources, and local install bindings.\r\n- Better `cfs info` output for installed kit state, drift, resources, and provenance.\r\n- Safer kit update behavior around changed, removed, or rebound resources.\r\n- Explicit approval for kits that request dangerous tool permissions.\r\n- More reliable generated-agent output for public kit components and nested subagents.\r\n- Refreshed README and user guides for setup, configuration, agent tools, and project extensibility.\r\n\r\n## Upgrade Notes\r\n\r\nAfter upgrading, run this inside each Studio-enabled repository:\r\n\r\n```bash\r\ncfs update\r\ncfs validate-kits\r\ncfs generate-agents\r\n```\r\n\r\nIf you script local kit installs, add `--install-mode copy` or `--install-mode register`.\r\n\r\n## Full Changelog\r\n\r\nCompare: `v1.2.0...v1.3.0`\r\n\r\n\r\n## What's Changed\r\n* Support multi-kit canonical manifests and enhance kit management by @ainetx in https://github.com/constructorfabric/studio/pull/27\r\n\r\n\r\n**Full Changelog**: https://github.com/constructorfabric/studio/compare/v1.2.0...v1.3.0"

[whatsnew."v1.2.0"]
summary = "v1.2.0"
details = "## What's Changed\r\n\r\n  ### Kit installation and updates\r\n\r\n  - Added support for installing kits from generic Git sources, not only GitHub shorthand or local paths.\r\n    - New source format: `git/<url>[//<subdir>][@<kit>]`\r\n    - Example: `cfs kit install git/https://example.com/org/kit.git --version v1.2.3`\r\n    - Works with HTTPS, SSH, scp-like Git URLs, and `file://` repositories.\r\n\r\n  - Added `--version` support for generic Git kit installs and updates.\r\n    - The value can be a tag, branch, ref, or commit SHA.\r\n    - Studio stores both the requested ref and the resolved commit identity.\r\n\r\n  - Generic Git kits now record source provenance and content identity.\r\n    - Studio tracks source type, selected subdirectory, kit identity, resolved commit SHA, freshness, and cache metadata.\r\n    - This makes installed kit state easier to audit and reproduce.\r\n\r\n  - Added cache-backed fallback for generic Git kits.\r\n    - If a registered Git kit cannot be resolved online, Studio can reuse a matching last-known cached artifact when provenance matches.\r\n\r\n  - Hardened generic Git source parsing and diagnostics.\r\n    - Credentials embedded in URLs are rejected.\r\n    - Query strings and fragments are rejected.\r\n    - Diagnostics avoid leaking credentials or raw secret-bearing URL data.\r\n\r\n  ### Studio update and install metadata\r\n\r\n  - `cfs init` and `cfs update` now preserve install metadata pins through `version.toml`.\r\n    - A repaired or refreshed project can keep using the same pinned Studio engine version.\r\n    - `whatsnew.toml` and `version.toml` are now managed at the Studio install root.\r\n\r\n  - `cfs update` now reads already-seen What's New entries from the install root.\r\n    - This avoids showing the same core release notes again after the project has already seen them.\r\n\r\n  ### Agent integration generation\r\n\r\n    - To remove legacy Cypilot artifacts explicitly, use:\r\n      `cfs generate-agents --remove-cypilot yes`\r\n\r\n  - The dedicated Cypilot migration cleanup still removes legacy Cypilot artifacts when running the migration path.\r\n\r\n  ### Workflows\r\n\r\n  - Added `cf-brave-new-world`, an autonomous-default overlay.\r\n    - It can choose safe, reversible workflow options without repeatedly asking the user.\r\n    - It still falls back to the user for destructive, irreversible, external, permission-related, secret-bearing, or git-mutating choices.\r\n    - It can be disabled with “turn off Brave New World”.\r\n\r\n  ### Reliability and safety\r\n\r\n  - Strengthened Studio git commit trailer handling.\r\n    - Agent-created commits must pass trailer preflight before `git commit`.\r\n    - Studio verifies the final commit message after commit creation.\r\n\r\n  - Improved support for both `cf-studio-path` and legacy `cf-path` project markers when resolving project-local Studio installs.\r\n\r\n**Full Changelog**: https://github.com/constructorfabric/studio/compare/v1.1.3...v1.2.0"

