details = "## What's Changed\r\n* Fix prompts by @ainetx in https://github.com/constructorfabric/studio/pull/1\r\n* Harden CF workflows and align prompt assertions with contracts by @ainetx in https://github.com/constructorfabric/studio/pull/2\r\n* feat(generate): lazy-load late workflow rules by @ainetx in https://github.com/constructorfabric/studio/pull/4\r\n* Merge pull request #2 from constructorfabric/main by @ainetx in https://github.com/constructorfabric/studio/pull/5\r\n* Fix prompts 2 by @ainetx in https://github.com/constructorfabric/studio/pull/7\r\n* Refactor stop-token policy and workflow entry requirements by @ainetx in https://github.com/constructorfabric/studio/pull/8\r\n* Fix prompts dups by @ainetx in https://github.com/constructorfabric/studio/pull/9\r\n* Cfs pdsl det by @ainetx in https://github.com/constructorfabric/studio/pull/10\r\n* Enhance workflow and testing for author plan handling and routing by @ainetx in https://github.com/constructorfabric/studio/pull/11\r\n* Enhance workflows with mode directives and clarity improvements by @ainetx in https://github.com/constructorfabric/studio/pull/12\r\n* Fixing prompts 6 by @ainetx in https://github.com/constructorfabric/studio/pull/13\r\n* Add brainstorming session state documentation and enhance storytelling modes with challenge portion lifecycle by @ainetx in https://github.com/constructorfabric/studio/pull/14\r\n* Enhance workflows with new skill authoring, routing, and discovery by @ainetx in https://github.com/constructorfabric/studio/pull/15\r\n\r\n\r\n**Full Changelog**: https://github.com/constructorfabric/studio/commits/v0.1.0"
