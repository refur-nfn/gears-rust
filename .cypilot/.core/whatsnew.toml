["v3.8.0-beta"]
summary = "Prompt compactification round 2, list-ids kind inference fix, deterministic self-check"
details = """\
- **Major prompt compactification** — second compaction pass across `skills/cypilot/SKILL.md`, `workflows/analyze.md`, `workflows/generate.md`, `workflows/plan.md`, `workflows/workspace.md`, and the `cypilot-codegen` / `cypilot-pr-review` / `cypilot-ralphex` agent definitions; SKILL.md trimmed by ~200 lines, plan.md by ~190 lines while preserving validation gates, escalation logic, and lifecycle handoff
- **`prompt-engineering.md` loadable-resource-budget rule** — expanded with explicit exemptions and measurement clarifications so agents apply the budget consistently; **`agent-compliance.md`** progress-checkpoint persistence requirements tightened; **`raw-input-overflow.md`** clarifies the chunk-input approval flow and its interaction with the single-context bypass
- **Plan workflow Phase 0 variable checkpoint** — variables resolved during Phase 0 are now persisted to `plan.toml` `[meta]` so phase runners and recovery flows reuse the same context
- **Fix: `list-ids` kind inference (#157)** — `_infer_kind` now picks the first matching kind token (matching the canonical `cpt-{system}-{kind}-{slug}` grammar) instead of the last, fixing wrong-kind reports for slugs containing kind keywords (e.g. `interface-component-registry`)
- **Fix: kit examples validation coverage and determinism (#154)** — `self-check` now collects every `*.md` example file via `sorted(Path(examples_dir).glob("*.md"))` and runs `validate_artifact_file` on each (instead of validating only one file); the result dict gains `example_paths` and `examples_checked`, and the legacy `example_path` field stays for backward-compat as the first sorted file
- **`self-check` JSON output schema documented in `cypilot.clispec`** — full schema for machine-readable self-check results; interactive TTY accept test expanded to verify all six prompt lines
- **Test coverage** — added unit tests covering both branches of `_prompt_kit_install_flag` (non-interactive, no-tty, accept/decline, full-word accept, EOF) to keep `init.py` per-file coverage above the 90% threshold
- **Compact CLI prompts** — `cpt-install` prompt collapsed to one-line format; `whatsnew` continue prompt simplified; `agents.py` copilot-instructions.md template marker order fixed
- **Project metadata** — `NOTICE` file added with copyright and license information; copyright year updated; README version badge bumped\
"""

["v3.9.0"]
summary = "Storytelling/explain methodology, language-complexity UX setting, agent-generation/delegation polish"
details = """\
- **Storytelling methodology (`EXPLAIN_MODE`)** — new pedagogical companion for `analyze`: `cypilot analyze: explain <target>` (also `walk me through`, `teach me`, `present`, `onboard me to`, `quiz me on`, `explain --resume {session-id}`) delivers an artifact / PR / codebase region in line-bounded portions with 6-slot navigation (Next / Deeper / Lateral / Recap / Ask / Wrap), audience-adapted diagrams, clickable source refs, and an immediate-effect open-questions buffer that is author-routed (no Cypilot-generated `Fix Prompt` / `Plan Prompt`)
- **Six storytelling modes** — `presentation` (default; explain & teach), `review` (panel critique with line-anchored comments), `onboarding`, `decision` (alternatives + recommendation + dissenting opinions), `socratic` (agent quizzes you), `change-impact`; mode resolution is **always interactive** at session start — intent verbs / artifact KIND only suggest a default
- **`EXPLAIN_EXPORT` package generation** — `cypilot generate: explain package for <target>` (also `make a README from <target>` / `build onboarding doc set for <target>` / `training material for ...`) writes a navigable folder of Markdown files under `{cypilot_path}/.cache/explain/packages/` with `index.md` Mermaid navigation graph, per-portion files, and mode-specific extras (reading roadmap / impact map / review-comments file / dissenting opinions)
- **Methodology specs** — new `requirements/storytelling.md` (router) plus four modules: `storytelling-phases.md` (E0–E5 protocol), `storytelling-modes.md`, `storytelling-export.md`, `storytelling-preferences.md`; `analyze.md` integrates `EXPLAIN_MODE` (skips Phase 2 / 3 / 5 + Fix/Plan prompts; uses Storytelling Output schema in Phase 4) with a fail-stop routing invariant — any answer-style content emitted before E1 gates resolve is INVALID
- **Plain `analyze` stays plain** — ordinary `review my changes` / `audit this design` / `inspect this code` requests are NOT auto-promoted into `EXPLAIN_MODE`; storytelling requires explicit explain-family verbs, and `EXPLAIN_MODE` + `PROMPT_REVIEW` are mutually exclusive (agent must disambiguate)
- **Language complexity UX setting** — new global `language_complexity` level (`low` / `middle` (default) / `high`) governs ALL Cypilot user-facing output (chat + artifact bodies); set in `{cypilot_path}/config/core.toml` under `[language] complexity = "..."`, with mid-session override `change language complexity to {low|middle|high}` and persistence via `remember new language complexity`; spec/normative files and source quotes from input artifacts are exempt; full rule in `requirements/language-complexity.md`
- **`generate-agents` preview tracks deletions** — preview pass now counts deleted files (and workflow renames as deletions) alongside creates/updates; user prompt and dry-run reports now show `Will create N file(s), update N file(s), delete N file(s)`; up-to-date detection treats zero-delta as no-op
- **`cypilot-ralphex` delegation status semantics clarified** — `"ready"` is dry-run only (ralphex NOT invoked, no exit code, Post-Run Handoff is SKIPPED); `"delegated"` means ralphex executed with returncode 0 and lifecycle transitioned to `completed` (`returncode` / `stdout` / `stderr` populated); `"error"` covers preconditions and non-zero ralphex exits; agent self-test updated to match
"""