# Cypilot Core — What's New
# Entries are shown once during `cpt update` when the user hasn't seen them yet.
# Keys are version strings; only entries missing from config/whatsnew.toml are displayed.

["v3.0.3-beta"]
summary = "Variable-based path references"
details = """\
- Migrated all path references from hardcoded @/ prefix to {cypilot_path}/ variable
- Blueprints, skills, and workflows now use {cypilot_path} for portability
- Allows custom adapter directory names (e.g. .bootstrap for self-hosted repo)\
"""

["v3.0.4-beta"]
summary = "Kit migration with three-way merge"
details = """\
- Introduced conf.toml-based kit versioning (single kit-level version)
- Three-way merge for blueprint migration: unchanged markers updated, customized preserved
- Removed per-blueprint version and kit fields from @cpt:blueprint TOML blocks
- Added .prev/ snapshot for accurate old-reference comparison\
"""

["v3.0.5-beta"]
summary = "Three-way merge stability and shared helpers"
details = """\
- Fixed three-way merge to correctly insert new markers added in reference
- Improved error handling for kit migration and regeneration
- Extracted shared helpers for cypilot directory resolution and kit output generation
- .prev/ directory cleaned up after migration and first install\
"""

["v3.0.6-beta"]
summary = "CLI improvements"
details = """\
- Show help text instead of JSON error when no subcommand provided
- Added version consistency checks across package files
- Added contributing guide\
"""

["v3.0.7-beta"]
summary = "Named markers, interactive migration, and blueprint fixes"
details = """\
- Named marker syntax: @cpt:TYPE:ID for stable identity-based merge
- Legacy marker auto-normalization during migration (positional → named)
- Interactive migration with per-marker color-coded unified diffs
- Marker deletion/restoration tracking with unified prompt
- Sysprompt singleton support and improved fence tracking in blueprint parser
- Orphaned marker cleanup\
"""

["v3.0.8-beta"]
summary = "Dual-mode CLI output, interactive modify (editor)"
details = """\
- All commands now support --json flag for machine-readable JSON output (for AI agents)
- Without --json, commands produce human-friendly output with colors, progress, and hints
- Global --json flag extracted before command dispatch in CLI entrypoint
- Shared ui.py module for consistent output formatting across all commands
- Interactive migration: new 'm' (modify) option opens $VISUAL/$EDITOR for manual marker merge
- Editor pre-fills user content with commented diff for reference, git-style
- SKILL.md updated to mandate --json for all agent invocations
- Top-level help (cpt / cpt --help) shows structured command reference
- Files-read debug list now appears BEFORE user action prompts (approve/yes/no), not at response end
- V2→V3 migration: git submodule deinit failure is now non-fatal — cleanup continues with manual fallback steps
- Renamed `agents` command to `generate-agents` (interactive: preview → confirm → write)
- Old `agents` command now read-only: shows generated files and suggests `generate-agents`
- CLI invocation standardized to `cpt` for terminal commands; `cypilot` reserved for chat prompts
- Humanized proxy installer with interactive download explanation
- V2→V3 migration: step-by-step human-friendly progress output
- V2→V3 migration: fixed agent generation — now actually writes agent files (was read-only listing)
- `cpt update` now auto-regenerates agent configs when core or kits are updated\
"""

["v3.0.9-beta"]
summary = "Blueprint removal, direct file kits, TOC-aware diffs, CI pipeline"
details = """\
- **ADR-0001: Blueprint system removed** — kits are now direct file packages; no `process_kit`, no three-way merge, no hash registries
- **`cpt init` auto-downloads latest** before initialization (no manual `cpt update` needed first)
- **Kit version in core.toml** — single source of truth; `conf.toml` no longer copied into installed kit
- **`cpt kit update <path>`** — takes explicit source path instead of resolving from cache
- **`cpt kit install`** simplified — delegates to `install_kit()` + `regenerate_gen_aggregates()`
- **Centralized `.gen/` aggregation** — `regenerate_gen_aggregates()` in kit.py replaces scattered logic
- **TOC-aware kit diffs** — TOC sections stripped before comparison; optional TOC regeneration after file write
- **Version check in `update_kit`** — skips update if installed version matches source (use `--force` to override)
- **`cpt kit migrate` deprecated** — returns error with hint to use `kit update <path>`
- **Kit slug simplified** — `cypilot-sdlc` → `sdlc` in core.toml and artifacts.toml
- **`constraints.toml` in kit source root** — ready file, no longer auto-generated from blueprints
- **Resource diff engine** (`utils/diff_engine.py`): file-level diffs for regenerated resources with accept/reject/modify modes
- **Self-check integrated into `cpt update`**: runs automatically after kit update, reports PASS/WARN
- **GitHub Actions CI pipeline**: validate-kits job added; 6 parallel jobs (test, coverage, vulture, versions, spec-coverage, validate)
- **Local CI via act**: `make ci` runs the same workflow in Docker; auto-detects arm64/amd64; sequential fail-fast
- New `spec-coverage` command with `--system`, `--min-coverage`, `--min-file-coverage`, `--json`
- Added `@cpt-begin`/`@cpt-end` wrapping blocks to all 42 source files (97.7% spec coverage)
- TOC `--max-level` default changed from 6 to 3 in `toc` and `validate-toc` commands
- `config/AGENTS.md` loading changed from `WHEN it exists` → `FIRST`
- `_show_whatsnew` now compares against installed version number instead of key-set diff\
"""

["v3.0.10-beta"]
summary = "Dynamic kit registration, auto-generated upgrade tests"
details = """\
- **Kit not hardcoded in core.toml** — `_default_core_toml()` now returns empty `kits`; sdlc registered only when user accepts installation
- **`cpt update` respects core.toml** — no longer installs kits that aren't registered
- **E2E upgrade tests auto-generated** — `_VERSION_TAGS` populated from git tags; no manual maintenance needed\
"""

["v3.0.11-beta"]
summary = "Kit update respects resource bindings"
details = """\
- **`cpt kit update` honors resource bindings** — files are updated at their registered paths from `core.toml`, not default `config/kits/{slug}/` paths
- **Directory resource support** — directory resources correctly compute relative paths within the bound directory
- **Backward compatible** — files without bindings still go to default paths
- **New `build_source_to_resource_mapping()`** — maps source file paths to resource IDs for manifest-driven kits\
"""

["v3.0.12-beta"]
summary = "Template variable resolution"
details = """\
- **New `cpt resolve-vars` command** — resolves kit template variables (`{adr_template}`, `{scripts}`, etc.) to absolute paths
- **`cpt info` includes `variables` dict** — all template variables resolved automatically during info discovery
- **`--flat` mode** — outputs a single merged dict for direct `format_map` substitution
- **`--kit <slug>` filter** — restricts output to system vars + a single kit's resources
- **Execution protocol updated** — `variables` added to parsed `cpt info` fields; compaction recovery restores variable context
- **Protocol Guard updated** — explicit steps to store and resolve `{variable}` references in kit files\
"""

["v3.0.13-beta"]
summary = "Execution plans, plan escalation gate, workflow routing"
details = """\
- **Execution Plans workflow** (`workflows/plan.md`): decomposes large tasks into self-contained phase files (≤500 lines) that any AI agent can execute without Cypilot context
- **Plan template** (`requirements/plan-template.md`): strict structure for phase files — TOML frontmatter, inlined rules, pre-resolved paths, binary acceptance criteria
- **Plan decomposition** (`requirements/plan-decomposition.md`): strategies for generate (template sections), analyze (checklist categories), implement (CDSL blocks)
- **Mandatory Plan Escalation Gate** in `generate.md` and `analyze.md` — estimates context size before proceeding; MUST offer `/cypilot-plan` when exceeding budget (generate >2500, analyze >2000 lines)
- **Workflow routing fix**: `plan` route added with highest priority in SKILL.md — "plan to generate PRD" now correctly routes to plan workflow, not generate
- **"Kit Rules Are Law" constraint**: rules.md is NEVER trimmed or summarized to fit budgets; phases are split instead
- **Context budget thresholds** calibrated from real SDLC kit sizes and prompt engineering research (Lost in the Middle, rule-following degradation >8K tokens)
- **Execution plans FEATURE spec** fully checked off (88/90 items done)\
"""

["v3.0.14-beta"]
summary = "Selective architecture copy, CLI preference for agents, multi-repo workspace federation"
details = """\
- **Selective architecture copy** — `.core/` now copies only essential specs from `architecture/` (traceability.md, CDSL.md, cli.md, artifacts-registry.md, kit/*.md) instead of full ADR/DESIGN/PRD/features; reduces `.core/` footprint and avoids copying project-specific artifacts
- **Force mode clears `.core/`** — `cpt update` now fully removes `.core/` before copying to ensure no stale files remain from previous versions
- **Prefer `cpt` CLI over direct script invocation** — SKILL.md detects and prefers installed `cpt` command over raw `python3` invocations for AI agents (shorter commands = more reliable LLM execution)
- **CLI Resolution in SKILL.md** — compact section with `~/.cypilot/cache/` for dismissal state instead of project-local `.local/`
- **Secret scanner fix** — replaced high-entropy `_ID_CHARS` string literal with `string.ascii_lowercase + string.digits` to avoid false positives from trufflehog3 and similar tools
- **Workspace federation** — cross-repo artifact traceability without merging adapters; standalone `.cypilot-workspace.toml` or inline `[workspace]` in `config/core.toml`
- **New CLI commands**: `workspace-init`, `workspace-add`, `workspace-info`, `workspace-sync`
- **Git URL sources** — standalone workspace files support remote Git repos with branch pinning and namespace rules
- **Cross-repo ID resolution** — `validate` and `list-ids` gain `--local-only` and `--source` flags for workspace-aware operations
- **WorkspaceContext** — context upgrade from `CypilotContext` with lazy loading and graceful degradation for unreachable sources\
"""

["v3.0.15-beta"]
summary = "Secret scanner fix, kit update fix"
details = """\
- **Secret scanner fix** — sanitized high-entropy string in `git_utils.py` to avoid false positives from trufflehog3 and similar tools
- **Fix: new manifest resources registered during kit update** — when a kit adds new resources in `manifest.toml`, `cpt kit update` now merges them into `core.toml` resource bindings instead of ignoring them\
"""

["v3.1.0-beta"]
summary = "Subagent registration, execution plan improvements, ADR-0017"
details = """\
- **Subagent generation** — `cpt agents` generates isolated subagent definitions (`cypilot-codegen`, `cypilot-pr-review`) with scoped tools and dedicated prompts
- **`agents.toml` discovery** — agent definitions loaded from kit `agents.toml` files with semantic capabilities (mode, isolation, model)
- **Per-tool template mapping** — translates semantic agent config to tool-specific frontmatter (Claude, Cursor, Copilot, OpenAI)
- **Windsurf graceful skip** — subagent generation skipped for IDEs without subagent support
- **Recursive interaction scanning** — plan workflow now recursively scans all referenced files for interaction points with regex patterns
- **Mandatory plan validation gate** — Phase 4.1 requires self-validation against checklist before execution; reports per-category PASS/FAIL
- **Plan completion lifecycle** — explicit lifecycle strategy execution (gitignore/cleanup/archive/manual) with user prompts
- **Abandoned plan recovery** — plan.toml serves as checkpoint; recovery prompt for resuming incomplete plans
- **New plan-checklist.md** — 7-category validation checklist for plan quality assurance\
"""

["v3.2.0-beta"]
summary = "Prompt compactification across workflows, requirements, and SKILL.md"
details = """\
- **Aggressive prompt compactification release** — reduced the main prompt/instruction set from `9538` lines to `3851` lines (`-59.6%`) across `17` canonical files in `workflows/`, `requirements/`, and `skills/cypilot/SKILL.md`
- **Core workflow compaction** — condensed `workflows/analyze.md`, `workflows/generate.md`, `workflows/plan.md`, and `workflows/workspace.md` while preserving deterministic validation gates, plan escalation, lifecycle handoff, and recovery flow
- **Requirements compaction** — compressed execution infrastructure, plan support docs, methodologies, checklists, and workspace guidance in `requirements/` to reduce token load while keeping operational constraints and validation structure explicit
- **SKILL and workspace guidance compacted** — shortened `skills/cypilot/SKILL.md`, `requirements/workspace.md`, and `workflows/workspace.md` so agents load less context during normal routing and execution
- **Checklist and methodology normalization** — streamlined `code-checklist.md`, `consistency-checklist.md`, `plan-checklist.md`, `prompt-engineering.md`, `reverse-engineering.md`, and `auto-config.md` into denser formats optimized for agent consumption
- **Post-compaction TOC fix** — marker-based `validate-toc` now expects the same heading set that `toc` generates, so documents with secondary `H1` sections such as `# MUST HAVE` / `# MUST NOT HAVE` validate correctly with `--max-level 2`
- **Regression coverage added** — test coverage now includes the marker-based TOC validation case with secondary `H1` sections in a single document\
"""

