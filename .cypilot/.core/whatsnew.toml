- **Manifest and migration error hardening** — binding-resolution failures surface explicitly, rollback/cleanup paths are tighter, and kit/manifest validation now reports invalid path scenarios more deterministically
- **New bug-finding methodologies** — added compact high-recall `requirements/bug-finding.md` for source-code review and `requirements/prompt-bug-finding.md` for prompt/instruction review, with workflow integration for bounded, evidence-driven analysis
